name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm trusted publishing (OIDC) + provenance

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      # Trusted publishing needs npm >= 11.5.1; Node 22 ships an older one.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run check
      - run: npm test
      - name: Verify tag matches package.json version
        run: |
          pkg="v$(node -p 'require("./package.json").version')"
          [ "$pkg" = "${GITHUB_REF_NAME}" ] || { echo "tag ${GITHUB_REF_NAME} != package ${pkg}"; exit 1; }
      - name: Publish (trusted publishing, provenance)
        run: npm publish --access public
      - name: GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes
