name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Lint & Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Lint & format (Biome)
        run: npm run check
      - name: Unit & integration tests
        run: npm test
      - name: Dogfood — stdd check on this repo
        run: npm run selfcheck
      - name: Smoke — init into a fresh directory
        run: |
          dir="$(mktemp -d)"
          node cli/stdd.mjs init "$dir" --tools claude,codex
          test -f "$dir/.stdd/method.md"
          test -f "$dir/.claude/skills/stdd-brainstorming/SKILL.md"
          node cli/stdd.mjs check "$dir"
      - name: Dogfood — committed kit matches a fresh init
        run: |
          node cli/stdd.mjs init --tools claude --session-hook
          git add -A
          git diff --cached --exit-code -- .claude .stdd .gitignore

  check-pr-evidence:
    name: Dogfood — PR docs evidence
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # check-pr --base needs history
      - name: stdd check-pr on this PR's body (live, diff-aware)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -o pipefail
          node --input-type=module -e '
            const url = "https://api.github.com/repos/" + process.env.GITHUB_REPOSITORY + "/pulls/" + process.env.PR_NUMBER;
            const res = await fetch(url, { headers: { authorization: "Bearer " + process.env.GH_TOKEN, accept: "application/vnd.github+json" } });
            if (!res.ok) { console.error("GitHub API " + res.status + " for " + url); process.exit(1); }
            process.stdout.write((await res.json()).body ?? "");
          ' | node cli/stdd.mjs check-pr - --base "origin/$GITHUB_BASE_REF"
