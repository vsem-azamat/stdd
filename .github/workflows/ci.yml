name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Lint & Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Lint & format (Biome)
        run: npm run check
      - name: Unit & integration tests
        run: npm test
      - name: Dogfood — stdd check on this repo
        run: npm run selfcheck
      - name: Smoke — init into a fresh directory
        run: |
          dir="$(mktemp -d)"
          node cli/stdd.mjs init "$dir" --tools claude,codex
          test -f "$dir/.stdd/method.md"
          test -f "$dir/.claude/skills/stdd-brainstorming/SKILL.md"
          node cli/stdd.mjs check "$dir"

  check-pr-evidence:
    name: Dogfood — PR docs evidence
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # check-pr --base needs history
      - name: stdd check-pr on this PR's body (live, diff-aware)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" --jq .body \
            | node cli/stdd.mjs check-pr - --base "origin/$GITHUB_BASE_REF"
